{% set name = "mgnifam" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 225e27538edfa441cd7aa051e3871e26064a0a3bbe5f94e2e1a46612975bafab

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - mgnifam = mgnifam.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.13
    - hatchling
    - pip
  run:
    - python >=3.13
    - numpy >=2.5.1,<3
    - pyfamsa >=0.7.0,<0.8
    - pyhmmer >=0.12.1,<0.13
    - pytrimal >=0.8.5,<0.9

test:
  imports:
    - mgnifam
  commands:
    - mgnifam --version
    - mgnifam generate_families --help

about:
  home: https://github.com/vagkaratzas/mgnifam
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Iterative HMM-based protein family generation over very large sequence databases
  dev_url: https://github.com/vagkaratzas/mgnifam

extra:
  recipe-maintainers:
    - vagkaratzas
